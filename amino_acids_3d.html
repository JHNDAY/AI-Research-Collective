<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amino Acid 3D Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1f2435;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text: #e8eaf0;
    --muted: #8891a8;
    --accent: #6ea8fe;
    --c-carbon: #7a7e8a;
    --c-hydrogen: #d8dce8;
    --c-nitrogen: #4a90d9;
    --c-oxygen: #e05c3a;
    --c-sulfur: #e8c53a;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 4px;
  }

  .mol-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
    width: 100%;
    gap: 2px;
  }

  .mol-btn:hover { background: var(--bg3); }

  .mol-btn.active {
    background: var(--bg3);
    border-color: var(--border2);
  }

  .mol-btn .name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .mol-btn .sub {
    font-size: 11px;
    color: var(--muted);
  }

  .mol-btn .formula {
    font-size: 11px;
    color: var(--accent);
    margin-top: 2px;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .info-bar {
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  #mol-info {
    font-size: 13px;
    color: var(--muted);
  }

  #mol-info strong {
    color: var(--text);
    font-weight: 500;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
  }

  .legend {
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--muted);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .controls-overlay {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: rgba(15,17,23,0.75);
    backdrop-filter: blur(6px);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .ctrl-btn:hover { background: var(--bg3); }

  @media (max-width: 600px) {
    .sidebar { width: 180px; padding: 12px 10px; }
    .layout { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
    .mol-btn .formula { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Amino Acid 3D Viewer</h1>
  <p>Nonpolar aliphatic amino acids — ball-and-stick models</p>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Molecules</div>
    <button class="mol-btn active" data-mol="ALA">
      <span class="name">Alanine</span>
      <span class="sub">Ala · A</span>
      <span class="formula">C₃H₇NO₂</span>
    </button>
    <button class="mol-btn" data-mol="VAL">
      <span class="name">Valine</span>
      <span class="sub">Val · V</span>
      <span class="formula">C₅H₁₁NO₂</span>
    </button>
    <button class="mol-btn" data-mol="LEU">
      <span class="name">Leucine</span>
      <span class="sub">Leu · L</span>
      <span class="formula">C₆H₁₃NO₂</span>
    </button>
    <button class="mol-btn" data-mol="ILE">
      <span class="name">Isoleucine</span>
      <span class="sub">Ile · I</span>
      <span class="formula">C₆H₁₃NO₂</span>
    </button>
    <button class="mol-btn" data-mol="MET">
      <span class="name">Methionine</span>
      <span class="sub">Met · M</span>
      <span class="formula">C₅H₁₁NO₂S</span>
    </button>
  </nav>

  <main class="main">
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div class="controls-overlay">
        <button class="ctrl-btn" id="btn-auto" title="Toggle auto-rotate">⟳</button>
        <button class="ctrl-btn" id="btn-reset" title="Reset view">⌖</button>
      </div>
    </div>

    <div class="info-bar">
      <div id="mol-info"><strong>Alanine</strong> — MW 89.1 Da · smallest chiral amino acid · methyl R-group</div>
      <div class="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
    </div>

    <div class="legend">
      <div class="leg"><div class="dot" style="background:#7a7e8a"></div>Carbon</div>
      <div class="leg"><div class="dot" style="background:#d8dce8;border:1px solid #555"></div>Hydrogen</div>
      <div class="leg"><div class="dot" style="background:#4a90d9"></div>Nitrogen</div>
      <div class="leg"><div class="dot" style="background:#e05c3a"></div>Oxygen</div>
      <div class="leg"><div class="dot" style="background:#e8c53a"></div>Sulfur</div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const MOLS = {
  ALA:{
    info:"<strong>Alanine</strong> — MW 89.1 Da · smallest chiral amino acid · methyl R-group",
    atoms:[
      {el:"C",x:0,y:0,z:0},{el:"C",x:1.52,y:0,z:0},{el:"O",x:2.18,y:1.06,z:0},
      {el:"O",x:2.15,y:-1.1,z:0},{el:"N",x:-0.68,y:1.25,z:0},{el:"C",x:-1.1,y:-1.2,z:0},
      {el:"H",x:0.05,y:-0.55,z:1.02},{el:"H",x:-0.32,y:2.08,z:0.42},{el:"H",x:-1.68,y:1.18,z:0.1},
      {el:"H",x:3.12,y:-0.98,z:0},{el:"H",x:-0.7,y:-2.1,z:0.42},{el:"H",x:-2.18,y:-1.1,z:0},
      {el:"H",x:-1.0,y:-1.4,z:-1.06}
    ],
    bonds:[[0,1],[1,2],[1,3],[0,4],[0,5],[0,6],[4,7],[4,8],[3,9],[5,10],[5,11],[5,12]]
  },
  VAL:{
    info:"<strong>Valine</strong> — MW 117.1 Da · branched-chain · symmetric isopropyl fork at β-carbon",
    atoms:[
      {el:"C",x:0,y:0,z:0},{el:"C",x:1.52,y:0,z:0},{el:"O",x:2.2,y:1.1,z:0},
      {el:"O",x:2.15,y:-1.08,z:0},{el:"N",x:-0.68,y:1.25,z:0},{el:"C",x:-0.72,y:-1.28,z:0.3},
      {el:"C",x:-1.6,y:-1.3,z:-0.92},{el:"C",x:-0.2,y:-2.6,z:0.9},
      {el:"H",x:0.06,y:-0.45,z:1.0},{el:"H",x:-0.3,y:2.1,z:0.35},{el:"H",x:-1.66,y:1.22,z:0.12},
      {el:"H",x:3.12,y:-0.95,z:0},{el:"H",x:-1.5,y:-1.0,z:1.18},
      {el:"H",x:-2.64,y:-1.05,z:-0.62},{el:"H",x:-1.62,y:-2.35,z:-1.28},{el:"H",x:-1.05,y:-0.68,z:-1.75},
      {el:"H",x:0.78,y:-2.85,z:1.22},{el:"H",x:-0.78,y:-3.42,z:0.42},{el:"H",x:-0.22,y:-2.55,z:1.98}
    ],
    bonds:[[0,1],[1,2],[1,3],[0,4],[0,5],[0,8],[4,9],[4,10],[3,11],[5,6],[5,7],[5,12],[6,13],[6,14],[6,15],[7,16],[7,17],[7,18]]
  },
  LEU:{
    info:"<strong>Leucine</strong> — MW 131.2 Da · branched-chain · isobutyl fork at γ-carbon",
    atoms:[
      {el:"C",x:0,y:0,z:0},{el:"C",x:1.52,y:0,z:0},{el:"O",x:2.2,y:1.1,z:0},
      {el:"O",x:2.15,y:-1.08,z:0},{el:"N",x:-0.68,y:1.25,z:0},{el:"C",x:-0.72,y:-1.28,z:0.3},
      {el:"C",x:-1.8,y:-1.4,z:-0.75},{el:"C",x:-2.8,y:-0.2,z:-0.72},{el:"C",x:-3.7,y:-0.3,z:0.5},
      {el:"C",x:-3.55,y:-0.15,z:-2.0},
      {el:"H",x:0.06,y:-0.45,z:1.0},{el:"H",x:-0.3,y:2.1,z:0.35},{el:"H",x:-1.66,y:1.22,z:0.12},
      {el:"H",x:3.12,y:-0.95,z:0},{el:"H",x:-0.3,y:-2.22,z:0.7},{el:"H",x:-0.95,y:-1.1,z:1.36},
      {el:"H",x:-1.45,y:-2.35,z:-1.12},{el:"H",x:-2.32,y:-1.6,z:0.18},{el:"H",x:-2.25,y:0.75,z:-0.68},
      {el:"H",x:-4.55,y:0.35,z:0.42},{el:"H",x:-3.28,y:-1.28,z:0.85},{el:"H",x:-4.15,y:0.52,z:1.32},
      {el:"H",x:-4.4,y:0.52,z:-1.92},{el:"H",x:-2.95,y:0.05,z:-2.88},{el:"H",x:-4.0,y:-1.14,z:-2.18}
    ],
    bonds:[[0,1],[1,2],[1,3],[0,4],[0,5],[0,10],[4,11],[4,12],[3,13],[5,6],[5,14],[5,15],[6,7],[6,16],[6,17],[7,8],[7,9],[7,18],[8,19],[8,20],[8,21],[9,22],[9,23],[9,24]]
  },
  ILE:{
    info:"<strong>Isoleucine</strong> — MW 131.2 Da · two chiral centers · asymmetric branch at β-carbon",
    atoms:[
      {el:"C",x:0,y:0,z:0},{el:"C",x:1.52,y:0,z:0},{el:"O",x:2.2,y:1.1,z:0},
      {el:"O",x:2.15,y:-1.08,z:0},{el:"N",x:-0.68,y:1.25,z:0},{el:"C",x:-0.72,y:-1.28,z:0.3},
      {el:"C",x:-0.5,y:-1.25,z:-1.18},{el:"C",x:-1.95,y:-1.55,z:1.05},{el:"C",x:-2.1,y:-2.82,z:1.85},
      {el:"H",x:0.06,y:-0.45,z:1.0},{el:"H",x:-0.28,y:2.1,z:0.35},{el:"H",x:-1.65,y:1.22,z:0.12},
      {el:"H",x:3.12,y:-0.95,z:0},{el:"H",x:0.0,y:-0.32,z:-1.62},{el:"H",x:-1.5,y:-1.42,z:-1.62},
      {el:"H",x:0.08,y:-2.15,z:-1.45},{el:"H",x:-2.78,y:-0.82,z:0.92},{el:"H",x:-2.28,y:-1.6,z:2.1},
      {el:"H",x:-1.28,y:-3.55,z:2.0},{el:"H",x:-2.95,y:-3.32,z:1.32},{el:"H",x:-2.42,y:-2.65,z:2.88}
    ],
    bonds:[[0,1],[1,2],[1,3],[0,4],[0,5],[0,9],[4,10],[4,11],[3,12],[5,6],[5,7],[5,16],[6,13],[6,14],[6,15],[7,8],[7,17],[8,18],[8,19],[8,20]]
  },
  MET:{
    info:"<strong>Methionine</strong> — MW 149.2 Da · contains sulfur · thioether (–S–CH₃) side chain",
    atoms:[
      {el:"C",x:0,y:0,z:0},{el:"C",x:1.52,y:0,z:0},{el:"O",x:2.2,y:1.1,z:0},
      {el:"O",x:2.15,y:-1.08,z:0},{el:"N",x:-0.68,y:1.25,z:0},{el:"C",x:-0.72,y:-1.28,z:0.3},
      {el:"C",x:-1.8,y:-2.0,z:-0.45},{el:"S",x:-1.5,y:-3.72,z:-0.1},{el:"C",x:-3.2,y:-4.2,z:-0.3},
      {el:"H",x:0.06,y:-0.45,z:1.0},{el:"H",x:-0.3,y:2.1,z:0.35},{el:"H",x:-1.66,y:1.22,z:0.12},
      {el:"H",x:3.12,y:-0.95,z:0},{el:"H",x:-0.28,y:-1.95,z:1.05},{el:"H",x:-0.95,y:-1.05,z:1.35},
      {el:"H",x:-2.78,y:-1.65,z:-0.12},{el:"H",x:-1.85,y:-1.88,z:-1.52},
      {el:"H",x:-3.65,y:-3.55,z:-1.05},{el:"H",x:-3.78,y:-4.12,z:0.62},{el:"H",x:-3.22,y:-5.25,z:-0.62}
    ],
    bonds:[[0,1],[1,2],[1,3],[0,4],[0,5],[0,9],[4,10],[4,11],[3,12],[5,6],[5,13],[5,14],[6,7],[6,15],[6,16],[7,8],[8,17],[8,18],[8,19]]
  }
};

const COLORS = {C:0x7a7e8a, H:0xd8dce8, O:0xe05c3a, N:0x4a90d9, S:0xe8c53a};
const RADII  = {C:0.35, H:0.22, O:0.32, N:0.32, S:0.44};

const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('c');
let W = wrap.clientWidth, H = wrap.clientHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
renderer.setClearColor(0x000000,0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 200);
camera.position.set(0,0,14);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl1 = new THREE.DirectionalLight(0xffffff, 0.9); dl1.position.set(5,8,6); scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8899ff, 0.3); dl2.position.set(-5,-4,-5); scene.add(dl2);

let molGroup = new THREE.Group();
scene.add(molGroup);

let autoRotate = true;
let rotX=0, rotY=0, panX=0, panY=0;
let isDragging=false, isRight=false, lastX=0, lastY=0;

function buildMol(key) {
  molGroup.clear();
  const mol = MOLS[key];
  mol.atoms.forEach(a => {
    const geo = new THREE.SphereGeometry(RADII[a.el], 24, 18);
    const mat = new THREE.MeshPhongMaterial({color:COLORS[a.el], shininess:70, specular:0x333333});
    const m = new THREE.Mesh(geo,mat);
    m.position.set(a.x,a.y,a.z);
    molGroup.add(m);
  });
  mol.bonds.forEach(([i,j]) => {
    const a = mol.atoms[i], b = mol.atoms[j];
    const av = new THREE.Vector3(a.x,a.y,a.z);
    const bv = new THREE.Vector3(b.x,b.y,b.z);
    const dir = new THREE.Vector3().subVectors(bv,av);
    const len = dir.length();
    const mid = new THREE.Vector3().addVectors(av,bv).multiplyScalar(0.5);
    const geo = new THREE.CylinderGeometry(0.075,0.075,len,12);
    const mat = new THREE.MeshPhongMaterial({color:0x555a68, shininess:30});
    const m = new THREE.Mesh(geo,mat);
    m.position.copy(mid);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
    molGroup.add(m);
  });
  const box = new THREE.Box3().setFromObject(molGroup);
  const center = new THREE.Vector3(); box.getCenter(center);
  molGroup.position.sub(center);
  const size = new THREE.Vector3(); box.getSize(size);
  camera.position.z = Math.max(size.x,size.y,size.z)*1.9+4;
  rotX=0; rotY=0; panX=0; panY=0;
  applyTransform();
}

function applyTransform() {
  molGroup.rotation.x = rotX;
  molGroup.rotation.y = rotY;
  molGroup.position.x = panX;
  molGroup.position.y = panY;
}

canvas.addEventListener('mousedown', e => {
  isDragging=true; isRight=e.button===2;
  lastX=e.clientX; lastY=e.clientY; autoRotate=false;
  document.getElementById('btn-auto').style.opacity='0.45';
  e.preventDefault();
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if(isRight){panX+=dx*0.012; panY-=dy*0.012;}
  else{rotY+=dx*0.012; rotX+=dy*0.012;}
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', ()=>{isDragging=false});
canvas.addEventListener('wheel', e=>{
  camera.position.z = Math.max(2, Math.min(40, camera.position.z+e.deltaY*0.025));
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchstart', e=>{
  isDragging=true; isRight=false;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  autoRotate=false;
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(!isDragging||e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  rotY+=dx*0.012; rotX+=dy*0.012;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  applyTransform();
},{passive:true});
canvas.addEventListener('touchend', ()=>{isDragging=false});

document.getElementById('btn-auto').addEventListener('click', ()=>{
  autoRotate=!autoRotate;
  document.getElementById('btn-auto').style.opacity=autoRotate?'1':'0.45';
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  rotX=0; rotY=0; panX=0; panY=0; applyTransform();
  camera.position.z=14;
});

document.querySelectorAll('.mol-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mol-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    buildMol(btn.dataset.mol);
    document.getElementById('mol-info').innerHTML = MOLS[btn.dataset.mol].info;
    autoRotate=true;
    document.getElementById('btn-auto').style.opacity='1';
  });
});

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate){rotY+=0.005; applyTransform();}
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  W=wrap.clientWidth; H=wrap.clientHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

buildMol('ALA');
animate();
</script>
</body>
</html>
