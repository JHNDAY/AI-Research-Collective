<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar Neutral Amino Acid 3D Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #181c27; --bg3: #1f2435;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
    --text: #e8eaf0; --muted: #8891a8; --accent: #6ea8fe;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0 8px; margin-bottom: 4px; }
  .mol-btn { display: flex; flex-direction: column; align-items: flex-start; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; background: transparent; cursor: pointer; transition: background .15s, border-color .15s; text-align: left; width: 100%; gap: 2px; }
  .mol-btn:hover  { background: var(--bg3); }
  .mol-btn.active { background: var(--bg3); border-color: var(--border2); }
  .mol-btn .name    { font-size: 14px; font-weight: 500; color: var(--text); }
  .mol-btn .sub     { font-size: 11px; color: var(--muted); }
  .mol-btn .formula { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; min-height: 420px; }
  canvas { display: block; width: 100%; height: 100%; }
  .info-bar { border-top: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  #mol-info { font-size: 13px; color: var(--muted); }
  #mol-info strong { color: var(--text); font-weight: 500; }
  .hint { font-size: 12px; color: var(--muted); opacity: 0.7; }
  .legend { border-top: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 18px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .controls-overlay { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; }
  .ctrl-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: rgba(15,17,23,0.75); backdrop-filter: blur(6px); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .ctrl-btn:hover { background: var(--bg3); }
  @media (max-width: 600px) {
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
    .layout  { flex-direction: column; }
    .mol-btn .formula { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Polar Neutral Amino Acid 3D Viewer</h1>
  <p>Uncharged polar side chains — hydrogen-bond donors and acceptors</p>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Molecules</div>
    <button class="mol-btn active" data-mol="ASN">
      <span class="name">Asparagine</span>
      <span class="sub">Asn · N</span>
      <span class="formula">C₄H₈N₂O₃</span>
    </button>
    <button class="mol-btn" data-mol="CYS">
      <span class="name">Cysteine</span>
      <span class="sub">Cys · C</span>
      <span class="formula">C₃H₇NO₂S</span>
    </button>
    <button class="mol-btn" data-mol="GLN">
      <span class="name">Glutamine</span>
      <span class="sub">Gln · Q</span>
      <span class="formula">C₅H₁₀N₂O₃</span>
    </button>
    <button class="mol-btn" data-mol="SER">
      <span class="name">Serine</span>
      <span class="sub">Ser · S</span>
      <span class="formula">C₃H₇NO₃</span>
    </button>
    <button class="mol-btn" data-mol="THR">
      <span class="name">Threonine</span>
      <span class="sub">Thr · T</span>
      <span class="formula">C₄H₉NO₃</span>
    </button>
  </nav>

  <main class="main">
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div class="controls-overlay">
        <button class="ctrl-btn" id="btn-auto" title="Toggle auto-rotate">⟳</button>
        <button class="ctrl-btn" id="btn-reset" title="Reset view">⌖</button>
      </div>
    </div>
    <div class="info-bar">
      <div id="mol-info"><strong>Asparagine</strong> — MW 132.1 Da · amide side chain · N-linked glycosylation site</div>
      <div class="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
    </div>
    <div class="legend">
      <div class="leg"><div class="dot" style="background:#7a7e8a"></div>Carbon</div>
      <div class="leg"><div class="dot" style="background:#d8dce8;border:1px solid #555"></div>Hydrogen</div>
      <div class="leg"><div class="dot" style="background:#4a90d9"></div>Nitrogen</div>
      <div class="leg"><div class="dot" style="background:#e05c3a"></div>Oxygen</div>
      <div class="leg"><div class="dot" style="background:#e8c53a"></div>Sulfur</div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const MOLS = {

  // Asparagine: NH2-CO-CH2-CH(NH2)-COOH
  ASN: {
    info: "<strong>Asparagine</strong> — MW 132.1 Da · amide side chain · N-linked glycosylation site",
    atoms: [
      {el:"C", x:0,     y:0,    z:0},     // 0 alpha-C
      {el:"C", x:1.52,  y:0,    z:0},     // 1 carboxyl C
      {el:"O", x:2.15,  y:1.08, z:0},     // 2 =O carboxyl
      {el:"O", x:2.18,  y:-1.06,z:0},     // 3 -OH carboxyl
      {el:"N", x:-0.67, y:1.27, z:0},     // 4 alpha-NH2
      {el:"C", x:-0.75, y:-1.22,z:0.3},   // 5 beta-C
      {el:"C", x:-1.92, y:-1.28,z:-0.62}, // 6 gamma carbonyl C
      {el:"O", x:-2.35, y:-0.22,z:-1.18}, // 7 gamma =O
      {el:"N", x:-2.72, y:-2.38,z:-0.62}, // 8 amide NH2
      // H's
      {el:"H", x:0.05,  y:-0.45,z:1.02},  // 9  H alpha
      {el:"H", x:-0.25, y:2.12, z:0.36},  // 10 H alpha-NH2
      {el:"H", x:-1.65, y:1.22, z:0.12},  // 11 H alpha-NH2
      {el:"H", x:3.12,  y:-0.94,z:0},     // 12 H carboxyl OH
      {el:"H", x:-0.32, y:-2.18,z:0.65},  // 13 H beta
      {el:"H", x:-0.98, y:-1.02,z:1.36},  // 14 H beta
      {el:"H", x:-2.18, y:-3.28,z:-0.18}, // 15 H amide NH2
      {el:"H", x:-3.72, y:-2.22,z:-0.62}, // 16 H amide NH2
    ],
    bonds: [
      [0,1],[1,2],[1,3],[0,4],[0,5],[0,9],
      [4,10],[4,11],[3,12],
      [5,6],[5,13],[5,14],
      [6,7],[6,8],
      [8,15],[8,16]
    ]
  },

  // Cysteine: HS-CH2-CH(NH2)-COOH
  CYS: {
    info: "<strong>Cysteine</strong> — MW 121.2 Da · thiol side chain · forms disulfide bridges",
    atoms: [
      {el:"C", x:0,     y:0,    z:0},     // 0 alpha-C
      {el:"C", x:1.52,  y:0,    z:0},     // 1 carboxyl C
      {el:"O", x:2.15,  y:1.08, z:0},     // 2 =O
      {el:"O", x:2.18,  y:-1.06,z:0},     // 3 -OH
      {el:"N", x:-0.67, y:1.27, z:0},     // 4 NH2
      {el:"C", x:-0.75, y:-1.22,z:0.3},   // 5 beta-C
      {el:"S", x:-2.42, y:-1.35,z:-0.52}, // 6 S (thiol)
      // H's
      {el:"H", x:0.05,  y:-0.45,z:1.02},  // 7  H alpha
      {el:"H", x:-0.25, y:2.12, z:0.36},  // 8  H NH2
      {el:"H", x:-1.65, y:1.22, z:0.12},  // 9  H NH2
      {el:"H", x:3.12,  y:-0.94,z:0},     // 10 H OH
      {el:"H", x:-0.32, y:-2.18,z:0.65},  // 11 H beta
      {el:"H", x:-0.98, y:-1.02,z:1.36},  // 12 H beta
      {el:"H", x:-2.95, y:-0.15,z:-0.82}, // 13 H thiol (SH)
    ],
    bonds: [
      [0,1],[1,2],[1,3],[0,4],[0,5],[0,7],
      [4,8],[4,9],[3,10],
      [5,6],[5,11],[5,12],
      [6,13]
    ]
  },

  // Glutamine: H2N-CO-CH2-CH2-CH(NH2)-COOH
  GLN: {
    info: "<strong>Glutamine</strong> — MW 146.2 Da · amide side chain · nitrogen shuttle in metabolism",
    atoms: [
      {el:"C", x:0,     y:0,    z:0},      // 0 alpha-C
      {el:"C", x:1.52,  y:0,    z:0},      // 1 carboxyl C
      {el:"O", x:2.15,  y:1.08, z:0},      // 2 =O carboxyl
      {el:"O", x:2.18,  y:-1.06,z:0},      // 3 -OH
      {el:"N", x:-0.67, y:1.27, z:0},      // 4 alpha-NH2
      {el:"C", x:-0.75, y:-1.22,z:0.3},    // 5 beta-C
      {el:"C", x:-1.92, y:-1.28,z:-0.62},  // 6 gamma-C
      {el:"C", x:-3.05, y:-1.35,z:0.38},   // 7 delta carbonyl C
      {el:"O", x:-3.28, y:-0.38,z:1.12},   // 8 delta =O
      {el:"N", x:-4.05, y:-2.32,z:0.38},   // 9 amide NH2
      // H's
      {el:"H", x:0.05,  y:-0.45,z:1.02},   // 10 H alpha
      {el:"H", x:-0.25, y:2.12, z:0.36},   // 11 H alpha-NH2
      {el:"H", x:-1.65, y:1.22, z:0.12},   // 12 H alpha-NH2
      {el:"H", x:3.12,  y:-0.94,z:0},      // 13 H carboxyl OH
      {el:"H", x:-0.32, y:-2.18,z:0.65},   // 14 H beta
      {el:"H", x:-0.98, y:-1.02,z:1.36},   // 15 H beta
      {el:"H", x:-1.62, y:-0.32,z:-1.28},  // 16 H gamma
      {el:"H", x:-2.22, y:-2.22,z:-1.22},  // 17 H gamma
      {el:"H", x:-3.72, y:-3.18,z:-0.08},  // 18 H amide NH2
      {el:"H", x:-5.02, y:-2.18,z:0.72},   // 19 H amide NH2
    ],
    bonds: [
      [0,1],[1,2],[1,3],[0,4],[0,5],[0,10],
      [4,11],[4,12],[3,13],
      [5,6],[5,14],[5,15],
      [6,7],[6,16],[6,17],
      [7,8],[7,9],
      [9,18],[9,19]
    ]
  },

  // Serine: HO-CH2-CH(NH2)-COOH
  SER: {
    info: "<strong>Serine</strong> — MW 105.1 Da · hydroxymethyl side chain · phosphorylation target",
    atoms: [
      {el:"C", x:0,     y:0,    z:0},     // 0 alpha-C
      {el:"C", x:1.52,  y:0,    z:0},     // 1 carboxyl C
      {el:"O", x:2.15,  y:1.08, z:0},     // 2 =O
      {el:"O", x:2.18,  y:-1.06,z:0},     // 3 -OH carboxyl
      {el:"N", x:-0.67, y:1.27, z:0},     // 4 NH2
      {el:"C", x:-0.75, y:-1.22,z:0.3},   // 5 beta-C
      {el:"O", x:-2.08, y:-1.32,z:-0.38}, // 6 beta-OH
      // H's
      {el:"H", x:0.05,  y:-0.45,z:1.02},  // 7  H alpha
      {el:"H", x:-0.25, y:2.12, z:0.36},  // 8  H NH2
      {el:"H", x:-1.65, y:1.22, z:0.12},  // 9  H NH2
      {el:"H", x:3.12,  y:-0.94,z:0},     // 10 H carboxyl OH
      {el:"H", x:-0.32, y:-2.18,z:0.65},  // 11 H beta
      {el:"H", x:-0.98, y:-1.02,z:1.36},  // 12 H beta
      {el:"H", x:-2.68, y:-0.55,z:-0.52}, // 13 H serine OH
    ],
    bonds: [
      [0,1],[1,2],[1,3],[0,4],[0,5],[0,7],
      [4,8],[4,9],[3,10],
      [5,6],[5,11],[5,12],
      [6,13]
    ]
  },

  // Threonine: CH3-CH(OH)-CH(NH2)-COOH
  THR: {
    info: "<strong>Threonine</strong> — MW 119.1 Da · beta-hydroxyl + methyl · two chiral centers · essential",
    atoms: [
      {el:"C", x:0,     y:0,    z:0},     // 0 alpha-C
      {el:"C", x:1.52,  y:0,    z:0},     // 1 carboxyl C
      {el:"O", x:2.15,  y:1.08, z:0},     // 2 =O
      {el:"O", x:2.18,  y:-1.06,z:0},     // 3 -OH carboxyl
      {el:"N", x:-0.67, y:1.27, z:0},     // 4 NH2
      {el:"C", x:-0.72, y:-1.28,z:0.3},   // 5 beta-C
      {el:"O", x:-0.42, y:-1.22,z:-1.12}, // 6 beta-OH
      {el:"C", x:-2.18, y:-1.32,z:0.72},  // 7 gamma-CH3
      // H's
      {el:"H", x:0.05,  y:-0.45,z:1.02},  // 8  H alpha
      {el:"H", x:-0.25, y:2.12, z:0.36},  // 9  H NH2
      {el:"H", x:-1.65, y:1.22, z:0.12},  // 10 H NH2
      {el:"H", x:3.12,  y:-0.94,z:0},     // 11 H carboxyl OH
      {el:"H", x:-1.22, y:-0.42,z:-1.52}, // 12 H beta-OH
      {el:"H", x:-1.28, y:-2.18,z:0.68},  // 13 H beta-C
      {el:"H", x:-2.52, y:-0.42,z:1.28},  // 14 H gamma-CH3
      {el:"H", x:-2.82, y:-1.72,z:-0.05}, // 15 H gamma-CH3
      {el:"H", x:-2.25, y:-1.92,z:1.62},  // 16 H gamma-CH3
    ],
    bonds: [
      [0,1],[1,2],[1,3],[0,4],[0,5],[0,8],
      [4,9],[4,10],[3,11],
      [5,6],[5,7],[5,13],
      [6,12],
      [7,14],[7,15],[7,16]
    ]
  }
};

const COLORS = {C:0x7a7e8a, H:0xd8dce8, O:0xe05c3a, N:0x4a90d9, S:0xe8c53a};
const RADII  = {C:0.35, H:0.22, O:0.33, N:0.33, S:0.44};

const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('c');
let W = wrap.clientWidth, H = wrap.clientHeight || 420;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 200);
camera.position.set(0, 0, 12);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl1 = new THREE.DirectionalLight(0xffffff, 0.9); dl1.position.set(5,8,6);   scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8899ff, 0.3); dl2.position.set(-5,-4,-5); scene.add(dl2);

let molGroup = new THREE.Group();
scene.add(molGroup);

let autoRotate = true;
let rotX=0, rotY=0, rotZ=0, panX=0, panY=0;
let isDragging=false, isRight=false, lastX=0, lastY=0;

function buildMol(key) {
  molGroup.clear();
  const mol = MOLS[key];

  mol.atoms.forEach(a => {
    const geo = new THREE.SphereGeometry(RADII[a.el], 24, 18);
    const mat = new THREE.MeshPhongMaterial({color:COLORS[a.el], shininess:70, specular:0x333333});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(a.x, a.y, a.z);
    molGroup.add(m);
  });

  mol.bonds.forEach(([i,j]) => {
    const a = mol.atoms[i], b = mol.atoms[j];
    const av = new THREE.Vector3(a.x,a.y,a.z);
    const bv = new THREE.Vector3(b.x,b.y,b.z);
    const dir = new THREE.Vector3().subVectors(bv,av);
    const len = dir.length();
    const mid = new THREE.Vector3().addVectors(av,bv).multiplyScalar(0.5);
    const geo = new THREE.CylinderGeometry(0.075,0.075,len,12);
    const mat = new THREE.MeshPhongMaterial({color:0x555a68, shininess:30});
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(mid);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
    molGroup.add(m);
  });

  const box = new THREE.Box3().setFromObject(molGroup);
  const center = new THREE.Vector3(); box.getCenter(center);
  molGroup.position.sub(center);
  const size = new THREE.Vector3(); box.getSize(size);
  camera.position.z = Math.max(size.x, size.y, size.z) * 2.0 + 4;

  rotX=0.2618; rotY=0; rotZ=0.4855; panX=0; panY=0;
  applyTransform();
}

function applyTransform() {
  molGroup.rotation.x = rotX;
  molGroup.rotation.y = rotY;
  molGroup.rotation.z = rotZ;
  molGroup.position.x = panX;
  molGroup.position.y = panY;
}

canvas.addEventListener('mousedown', e => {
  isDragging=true; isRight=e.button===2;
  lastX=e.clientX; lastY=e.clientY;
  autoRotate=false;
  document.getElementById('btn-auto').style.opacity='0.45';
  e.preventDefault();
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if(isRight){panX+=dx*0.012; panY-=dy*0.012;}
  else{rotY+=dx*0.012; rotX+=dy*0.012;}
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', ()=>{isDragging=false});
canvas.addEventListener('wheel', e=>{
  camera.position.z = Math.max(2, Math.min(50, camera.position.z+e.deltaY*0.03));
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchstart', e=>{
  isDragging=true; isRight=false;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  autoRotate=false;
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(!isDragging||e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  rotY+=dx*0.012; rotX+=dy*0.012;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  applyTransform();
},{passive:true});
canvas.addEventListener('touchend', ()=>{isDragging=false});

document.getElementById('btn-auto').addEventListener('click', ()=>{
  autoRotate=!autoRotate;
  document.getElementById('btn-auto').style.opacity = autoRotate ? '1' : '0.45';
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  rotX=0.2618; rotY=0; rotZ=0.4855; panX=0; panY=0;
  applyTransform();
  camera.position.z=12;
});

document.querySelectorAll('.mol-btn').forEach(btn=>{
  btn.addEventListener('click', function(e){
    const btn = e.target.closest('.mol-btn');
    if (!btn) return;
    document.querySelectorAll('.mol-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const mol = btn.dataset.mol;
    buildMol(mol);
    document.getElementById('mol-info').innerHTML = MOLS[mol].info;
    autoRotate=true;
    document.getElementById('btn-auto').style.opacity='1';
  });
});

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate){ rotY+=0.005; applyTransform(); }
  renderer.render(scene, camera);
}

window.addEventListener('resize', ()=>{
  W=wrap.clientWidth; H=wrap.clientHeight||420;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

buildMol('ASN');
animate();
</script>
</body>
</html>
