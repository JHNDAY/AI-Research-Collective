<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unique Amino Acid 3D Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #181c27; --bg3: #1f2435;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
    --text: #e8eaf0; --muted: #8891a8; --accent: #6ea8fe;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0 8px; margin-bottom: 4px; }
  .mol-btn { display: flex; flex-direction: column; align-items: flex-start; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; background: transparent; cursor: pointer; transition: background .15s, border-color .15s; text-align: left; width: 100%; gap: 2px; }
  .mol-btn:hover  { background: var(--bg3); }
  .mol-btn.active { background: var(--bg3); border-color: var(--border2); }
  .mol-btn .name    { font-size: 14px; font-weight: 500; color: var(--text); }
  .mol-btn .sub     { font-size: 11px; color: var(--muted); }
  .mol-btn .formula { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .mol-btn .note    { font-size: 10px; color: var(--muted); opacity: 0.7; margin-top: 3px; font-style: italic; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; min-height: 420px; }
  canvas { display: block; width: 100%; height: 100%; }
  .info-bar { border-top: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  #mol-info { font-size: 13px; color: var(--muted); }
  #mol-info strong { color: var(--text); font-weight: 500; }
  .hint { font-size: 12px; color: var(--muted); opacity: 0.7; }
  .legend { border-top: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 18px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .controls-overlay { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; }
  .ctrl-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: rgba(15,17,23,0.75); backdrop-filter: blur(6px); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .ctrl-btn:hover { background: var(--bg3); }
  @media (max-width: 600px) {
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
    .layout  { flex-direction: column; }
    .mol-btn .formula { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Unique Amino Acid 3D Viewer</h1>
  <p>Structurally exceptional — the only achiral and the only cyclic standard amino acids</p>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Molecules</div>
    <button class="mol-btn active" data-mol="GLY">
      <span class="name">Glycine</span>
      <span class="sub">Gly · G</span>
      <span class="formula">C₂H₅NO₂</span>
      <span class="note">Only achiral amino acid</span>
    </button>
    <button class="mol-btn" data-mol="PRO">
      <span class="name">Proline</span>
      <span class="sub">Pro · P</span>
      <span class="formula">C₅H₉NO₂</span>
      <span class="note">Only cyclic amino acid</span>
    </button>
  </nav>

  <main class="main">
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div class="controls-overlay">
        <button class="ctrl-btn" id="btn-auto" title="Toggle auto-rotate">⟳</button>
        <button class="ctrl-btn" id="btn-reset" title="Reset view">⌖</button>
      </div>
    </div>
    <div class="info-bar">
      <div id="mol-info"><strong>Glycine</strong> — MW 75.0 Da · two H atoms as R-group · no chiral center · smallest amino acid</div>
      <div class="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
    </div>
    <div class="legend">
      <div class="leg"><div class="dot" style="background:#7a7e8a"></div>Carbon</div>
      <div class="leg"><div class="dot" style="background:#d8dce8;border:1px solid #555"></div>Hydrogen</div>
      <div class="leg"><div class="dot" style="background:#4a90d9"></div>Nitrogen</div>
      <div class="leg"><div class="dot" style="background:#e05c3a"></div>Oxygen</div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const MOLS = {

  // Glycine: H2N-CH2-COOH
  // The alpha-carbon carries TWO hydrogens (no R-group) — this is why it has no chiral center
  GLY: {
    info: "<strong>Glycine</strong> — MW 75.0 Da · two H atoms as R-group · no chiral center · smallest amino acid",
    atoms: [
      {el:"C", x:0,    y:0,    z:0},     // 0  alpha-C
      {el:"C", x:1.52, y:0,    z:0},     // 1  carboxyl C
      {el:"O", x:2.15, y:1.08, z:0},     // 2  =O
      {el:"O", x:2.18, y:-1.06,z:0},     // 3  -OH
      {el:"N", x:-1.02,y:1.18, z:0},     // 4  NH2
      // Two H's on alpha-C (symmetric — makes it achiral)
      {el:"H", x:0.05, y:-0.6, z:1.0},   // 5  H alpha (up)
      {el:"H", x:0.05, y:-0.6, z:-1.0},  // 6  H alpha (down) — mirror image of 5
      // H's on NH2
      {el:"H", x:-1.62,y:1.18, z:0.82},  // 7
      {el:"H", x:-1.62,y:1.18, z:-0.82}, // 8
      // H on carboxyl OH
      {el:"H", x:3.12, y:-0.94,z:0},     // 9
    ],
    bonds: [
      [0,1],[1,2],[1,3],[0,4],
      [0,5],[0,6],
      [4,7],[4,8],
      [3,9]
    ],
    dblBonds: [[1,2]]
  },

  // Proline: pyrrolidine ring — N is part of the 5-membered ring
  // N connects to: alpha-C, delta-C, and backbone (no free NH2 — secondary amine)
  // Ring: N(4) - Cα(0) - Cβ(5) - Cγ(6) - Cδ(7) - N(4)
  PRO: {
    info: "<strong>Proline</strong> — MW 115.1 Da · pyrrolidine ring · secondary amine · helix-breaker in proteins",
    atoms: [
      {el:"C", x:0,     y:0,    z:0},      // 0  alpha-C (part of ring)
      {el:"C", x:1.52,  y:0,    z:0},      // 1  carboxyl C
      {el:"O", x:2.15,  y:1.08, z:0},      // 2  =O
      {el:"O", x:2.18,  y:-1.06,z:0},      // 3  -OH
      {el:"N", x:-0.62, y:1.30, z:0},      // 4  ring N (secondary — no free H on N in ring, but one H here for neutral form)
      {el:"C", x:-0.72, y:-1.28,z:0.2},    // 5  beta-C
      {el:"C", x:-1.52, y:-2.18,z:-0.68},  // 6  gamma-C
      {el:"C", x:-2.42, y:-1.32,z:-1.52},  // 7  delta-C (closes ring to N)
      // H on alpha-C
      {el:"H", x:0.18,  y:-0.35,z:1.05},   // 8
      // H on ring N
      {el:"H", x:-0.18, y:2.18, z:0.22},   // 9  N-H (proline has one H on N)
      // H on carboxyl OH
      {el:"H", x:3.12,  y:-0.94,z:0},      // 10
      // H's on beta-C
      {el:"H", x:-0.08, y:-1.98,z:0.95},   // 11
      {el:"H", x:-1.35, y:-0.92,z:0.92},   // 12
      // H's on gamma-C
      {el:"H", x:-0.82, y:-2.95,z:-1.28},  // 13
      {el:"H", x:-2.22, y:-2.78,z:-0.08},  // 14
      // H's on delta-C
      {el:"H", x:-3.15, y:-0.72,z:-0.95},  // 15
      {el:"H", x:-2.98, y:-2.05,z:-2.12},  // 16
    ],
    bonds: [
      // backbone
      [0,1],[1,2],[1,3],[0,8],
      [3,10],
      // pyrrolidine ring bonds
      [0,4],[0,5],[4,7],[5,6],[6,7],
      // ring H's
      [4,9],[5,11],[5,12],[6,13],[6,14],[7,15],[7,16]
    ],
    dblBonds: [[1,2]]
  }
};

const COLORS = {C:0x7a7e8a, H:0xd8dce8, O:0xe05c3a, N:0x4a90d9};
const RADII  = {C:0.35, H:0.22, O:0.33, N:0.33};

const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('c');
let W = wrap.clientWidth, H = wrap.clientHeight || 420;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 200);
camera.position.set(0, 0, 10);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl1 = new THREE.DirectionalLight(0xffffff, 0.9); dl1.position.set(5,8,6);   scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x8899ff, 0.3); dl2.position.set(-5,-4,-5); scene.add(dl2);

let molGroup = new THREE.Group();
scene.add(molGroup);

let autoRotate = true;
let rotX=0, rotY=0, rotZ=0, panX=0, panY=0;
let isDragging=false, isRight=false, lastX=0, lastY=0;

function makeBond(av, bv, radius, color) {
  const dir = new THREE.Vector3().subVectors(bv, av);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(av, bv).multiplyScalar(0.5);
  const geo = new THREE.CylinderGeometry(radius, radius, len, 12);
  const mat = new THREE.MeshPhongMaterial({color, shininess:30});
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(mid);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  return m;
}

function buildMol(key) {
  molGroup.clear();
  const mol = MOLS[key];

  mol.atoms.forEach(a => {
    const geo = new THREE.SphereGeometry(RADII[a.el], 24, 18);
    const mat = new THREE.MeshPhongMaterial({color:COLORS[a.el], shininess:70, specular:0x333333});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(a.x, a.y, a.z);
    molGroup.add(m);
  });

  mol.bonds.forEach(([i,j]) => {
    const av = new THREE.Vector3(mol.atoms[i].x, mol.atoms[i].y, mol.atoms[i].z);
    const bv = new THREE.Vector3(mol.atoms[j].x, mol.atoms[j].y, mol.atoms[j].z);
    molGroup.add(makeBond(av, bv, 0.075, 0x555a68));
  });

  if (mol.dblBonds) {
    mol.dblBonds.forEach(([i,j]) => {
      const av = new THREE.Vector3(mol.atoms[i].x, mol.atoms[i].y, mol.atoms[i].z);
      const bv = new THREE.Vector3(mol.atoms[j].x, mol.atoms[j].y, mol.atoms[j].z);
      const dir = new THREE.Vector3().subVectors(bv, av).normalize();
      const perp = new THREE.Vector3(0,0,1).cross(dir).normalize().multiplyScalar(0.14);
      molGroup.add(makeBond(av.clone().add(perp), bv.clone().add(perp), 0.04, 0x9aa0b8));
    });
  }

  const box = new THREE.Box3().setFromObject(molGroup);
  const center = new THREE.Vector3(); box.getCenter(center);
  molGroup.position.sub(center);
  const size = new THREE.Vector3(); box.getSize(size);
  camera.position.z = Math.max(size.x, size.y, size.z) * 2.2 + 3;

  rotX=0.2618; rotY=0; rotZ=0.4855; panX=0; panY=0;
  applyTransform();
}

function applyTransform() {
  molGroup.rotation.x = rotX;
  molGroup.rotation.y = rotY;
  molGroup.rotation.z = rotZ;
  molGroup.position.x = panX;
  molGroup.position.y = panY;
}

canvas.addEventListener('mousedown', e => {
  isDragging=true; isRight=e.button===2;
  lastX=e.clientX; lastY=e.clientY;
  autoRotate=false;
  document.getElementById('btn-auto').style.opacity='0.45';
  e.preventDefault();
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if(isRight){panX+=dx*0.012; panY-=dy*0.012;}
  else{rotY+=dx*0.012; rotX+=dy*0.012;}
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', ()=>{isDragging=false});
canvas.addEventListener('wheel', e=>{
  camera.position.z = Math.max(2, Math.min(40, camera.position.z+e.deltaY*0.03));
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchstart', e=>{
  isDragging=true; isRight=false;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  autoRotate=false;
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(!isDragging||e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  rotY+=dx*0.012; rotX+=dy*0.012;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  applyTransform();
},{passive:true});
canvas.addEventListener('touchend', ()=>{isDragging=false});

document.getElementById('btn-auto').addEventListener('click', ()=>{
  autoRotate=!autoRotate;
  document.getElementById('btn-auto').style.opacity = autoRotate ? '1' : '0.45';
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  rotX=0.2618; rotY=0; rotZ=0.4855; panX=0; panY=0; applyTransform();
  camera.position.z=10;
});

document.querySelectorAll('.mol-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.mol-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    buildMol(btn.dataset.mol);
    document.getElementById('mol-info').innerHTML = MOLS[btn.dataset.mol].info;
    autoRotate=true;
    document.getElementById('btn-auto').style.opacity='1';
  });
});

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate){ rotY+=0.005; applyTransform(); }
  renderer.render(scene, camera);
}

window.addEventListener('resize', ()=>{
  W=wrap.clientWidth; H=wrap.clientHeight||420;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

buildMol('GLY');
animate();
</script>
</body>
</html>
